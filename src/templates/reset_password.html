<!DOCTYPE html>
<html>
<head>
    <title>Reset Password - SukAnan Apartment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        h2 { color: #2c3e50; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>กำหนดรหัสผ่านใหม่</h2>
        <form action="/admin/reset-password" method="post">
            <input type="hidden" name="token" value="{{ token }}">
            <p style="font-size: 0.9em; color: #666; margin-bottom: 20px;">กรุณากรอกรหัสผ่านใหม่ที่คุณต้องการใช้งาน</p>
            <input type="password" name="password" placeholder="New Password" required autofocus minlength="6">
            <input type="password" id="confirm_password" placeholder="Confirm New Password" required minlength="6">
            <button type="submit" id="submit-btn">บันทึกรหัสผ่านใหม่</button>
        </form>
    </div>
    <script>
        const password = document.querySelector('input[name="password"]');
        const confirm = document.getElementById('confirm_password');
        const btn = document.getElementById('submit-btn');

        function validate() {
            if (password.value !== confirm.value) {
                confirm.setCustomValidity("รหัสผ่านไม่ตรงกัน");
            } else {
                confirm.setCustomValidity('');
            }
        }
        password.onchange = validate;
        confirm.onkeyup = validate;
    </script>
</body>
</html>
