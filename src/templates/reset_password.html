<!DOCTYPE html>
<html>
<head>
    <title>Reset Password - SukAnan Apartment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        h2 { color: #2c3e50; margin-bottom: 20px; }
        p { color: #666; margin-bottom: 30px; font-size: 0.9em; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; font-weight: bold; }
        .error { color: #e74c3c; margin-bottom: 20px; font-size: 0.9em; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Reset Password</h2>
        <p>ตั้งรหัสผ่านใหม่สำหรับ Admin</p>
        <form action="/admin/reset-password" method="post" onsubmit="return validateForm()">
            <input type="hidden" name="token" value="{{ token }}">
            <input type="password" id="new_password" name="new_password" placeholder="New Password" required minlength="4">
            <input type="password" id="confirm_password" placeholder="Confirm Password" required>
            <button type="submit">Update Password</button>
        </form>
        <p id="error-msg" class="error">รหัสผ่านไม่ตรงกัน</p>
    </div>
    <script>
        function validateForm() {
            const p1 = document.getElementById('new_password').value;
            const p2 = document.getElementById('confirm_password').value;
            if (p1 !== p2) {
                document.getElementById('error-msg').style.display = 'block';
                return false;
            }
            return true;
        }
    </script>
</body>
</html>
