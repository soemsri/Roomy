<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - SukAnan Apartment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        h2 { color: #2c3e50; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; font-weight: bold; }
        .error { color: #e74c3c; margin-bottom: 20px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Admin Login</h2>
        <form action="/admin/login" method="post">
            {% if first_run %}
            <div style="background: #e0f2ff; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9em; color: #005a9e;">
                <strong>ยินดีต้อนรับ!</strong> กรุณากำหนด Email และรหัสผ่านสำหรับเข้าใช้งานระบบครั้งแรก (Email นี้จะไม่สามารถเปลี่ยนได้ในภายหลัง)
            </div>
            <input type="email" name="email" placeholder="Admin Email (One-time setup)" required>
            {% endif %}
            <input type="password" name="password" placeholder="Admin Password" required autofocus>
            <button type="submit">{% if first_run %}Set Admin & Login{% else %}Login{% endif %}</button>
            </form>
            {% if not first_run %}
            <div style="margin-top: 15px; font-size: 0.85em;">
            <a href="/admin/forgot-password" style="color: var(--primary); text-decoration: none;">ลืมรหัสผ่าน?</a>
            </div>
            {% endif %}        <p id="error-msg" class="error" style="display:none;"></p>
        <p id="success-msg" class="success" style="display:none; color: #27ae60; background: #eafaf1; padding: 10px; border-radius: 5px; margin-bottom: 20px; font-size: 0.9em;"></p>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        const errorEl = document.getElementById('error-msg');
        const successEl = document.getElementById('success-msg');

        if (error) {
            errorEl.style.display = 'block';
            if (error === 'locked') {
                const wait = urlParams.get('wait') || '60';
                errorEl.innerText = `เครื่องนี้ถูกระงับการเข้าถึงชั่วคราวเนื่องจากรหัสผ่านผิดเกินกำหนด กรุณารอ ${wait} นาที`;
            } else if (error === 'email_required') {
                errorEl.innerText = 'กรุณากรอก Email สำหรับตั้งค่าแอดมิน';
            } else {
                errorEl.innerText = 'รหัสผ่านไม่ถูกต้อง';
            }
        }

        if (urlParams.has('reset')) {
            successEl.style.display = 'block';
            successEl.innerText = 'รีเซ็ตรหัสผ่านเรียบร้อยแล้ว กรุณาเข้าสู่ระบบด้วยรหัสผ่านใหม่';
        }
    </script>
</body>
</html>
