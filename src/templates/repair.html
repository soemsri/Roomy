<!DOCTYPE html>
<html>
<head>
    <title>แจ้งซ่อม - SukAnan Apartment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header { border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], textarea, input[type="file"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        textarea { height: 100px; }
        .btn { display: block; width: 100%; padding: 15px; background: #e67e22; color: white; text-align: center; border: none; border-radius: 5px; font-size: 1em; font-weight: bold; cursor: pointer; }
        .btn:hover { background: #d35400; }
        .success-msg { color: #27ae60; text-align: center; display: none; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h2>แจ้งซ่อมห้อง {{ room_number }}</h2>
        </div>
        
        <form id="repair-form" enctype="multipart/form-data">
            <input type="hidden" name="tenant_id" value="{{ tenant_id }}">
            <input type="hidden" name="room_id" value="{{ room_id }}">
            
            <div class="form-group">
                <label>หัวข้อการแจ้งซ่อม</label>
                <input type="text" name="title" placeholder="เช่น ก๊อกน้ำรั่ว, ไฟเสีย" required>
            </div>
            
            <div class="form-group">
                <label>รายละเอียด</label>
                <textarea name="description" placeholder="ระบุรายละเอียดเพิ่มเติม..." required></textarea>
            </div>
            
            <div class="form-group">
                <label>แนบรูปถ่าย (ถ้ามี)</label>
                <input type="file" name="image" accept="image/*">
            </div>
            
            <button type="submit" class="btn">ส่งข้อมูลแจ้งซ่อม</button>
        </form>
        
        <div id="success" class="success-msg">
            <h3>ส่งข้อมูลสำเร็จ!</h3>
            <p>เจ้าหน้าที่รับเรื่องแล้ว และจะดำเนินการตรวจสอบโดยเร็ว</p>
        </div>
    </div>

    <script>
        document.getElementById('repair-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const btn = this.querySelector('button');
            btn.disabled = true;
            btn.innerText = 'กำลังส่ง...';

            try {
                const response = await fetch('/repair/submit', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (result.status === 'Success') {
                    this.style.display = 'none';
                    document.getElementById('success').style.display = 'block';
                } else {
                    alert('เกิดข้อผิดพลาด: ' + result.message);
                    btn.disabled = false;
                    btn.innerText = 'ส่งข้อมูลแจ้งซ่อม';
                }
            } catch (error) {
                alert('ไม่สามารถติดต่อเซิร์ฟเวอร์ได้');
                btn.disabled = false;
                btn.innerText = 'ส่งข้อมูลแจ้งซ่อม';
            }
        });
    </script>
</body>
</html>
