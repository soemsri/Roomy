<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password - SukAnan Apartment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        h2 { color: #2c3e50; margin-bottom: 20px; }
        p { color: #666; margin-bottom: 30px; font-size: 0.9em; line-height: 1.5; }
        button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; font-weight: bold; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .message { margin-top: 20px; font-size: 0.9em; padding: 10px; border-radius: 5px; display: none; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .back-link { margin-top: 20px; display: block; color: #3498db; text-decoration: none; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Forgot Password</h2>
        <p>คลิกปุ่มด้านล่างเพื่อส่งลิงก์รีเซ็ตรหัสผ่านไปยัง LINE ของคุณ (Admin)</p>
        <button id="reset-btn" onclick="requestReset()">Request Reset Link</button>
        <div id="msg" class="message"></div>
        <a href="/admin/login" class="back-link">Back to Login</a>
    </div>

    <script>
        async function requestReset() {
            const btn = document.getElementById('reset-btn');
            const msg = document.getElementById('msg');
            
            btn.disabled = true;
            btn.innerText = 'Sending...';
            
            try {
                const response = await fetch('/admin/forgot-password', { method: 'POST' });
                const data = await response.json();
                
                msg.style.display = 'block';
                if (data.error) {
                    msg.className = 'message error';
                    msg.innerText = data.error;
                    btn.disabled = false;
                    btn.innerText = 'Request Reset Link';
                } else {
                    msg.className = 'message success';
                    msg.innerText = data.message;
                    btn.innerText = 'Sent!';
                }
            } catch (e) {
                msg.style.display = 'block';
                msg.className = 'message error';
                msg.innerText = 'เกิดข้อผิดพลาดในการเชื่อมต่อ';
                btn.disabled = false;
                btn.innerText = 'Request Reset Link';
            }
        }
    </script>
</body>
</html>
