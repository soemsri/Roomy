<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password - SukAnan Apartment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        h2 { color: #2c3e50; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; font-weight: bold; }
        .success { color: #27ae60; margin-bottom: 20px; font-size: 0.9em; background: #eafaf1; padding: 10px; border-radius: 5px; }
        a { color: #3498db; text-decoration: none; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>ลืมรหัสผ่าน</h2>
        
        <div id="sent-msg" class="success" style="display:none;">
            ระบบได้ส่งลิงก์รีเซ็ตรหัสผ่านไปที่อีเมลของคุณแล้ว (หากไม่พบ กรุณาตรวจสอบใน Junk/Spam)
        </div>

        <form action="/admin/forgot-password" method="post" id="forgot-form">
            <p style="font-size: 0.9em; color: #666; margin-bottom: 20px;">กรุณากรอกอีเมลแอดมินเพื่อรับลิงก์รีเซ็ตรหัสผ่าน</p>
            <input type="email" name="email" placeholder="Admin Email" required autofocus>
            <button type="submit">ส่งลิงก์รีเซ็ต</button>
        </form>
        
        <div style="margin-top: 20px;">
            <a href="/admin/login">กลับไปหน้าเข้าสู่ระบบ</a>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('sent') === '1') {
            document.getElementById('sent-msg').style.display = 'block';
            document.getElementById('forgot-form').style.display = 'none';
        }
    </script>
</body>
</html>
